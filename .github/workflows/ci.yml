# mysql-ops-learning: 编译 + 单元测试 + MySQL 冒烟测试
# 当 mysql-ops-learning 作为独立仓库时使用此工作流
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ['1.21', '1.22']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ matrix.go }}

      - name: Build
        run: go build -v ./...

      - name: Build binary
        run: go build -o mysql-ops ./cmd/main.go

      - name: Unit tests
        run: go test -v -count=1 ./...

  smoke-test:
    runs-on: ubuntu-latest
    needs: build-and-test
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: mysql_ops_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Wait for MySQL
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq default-mysql-client
          for i in $(seq 1 30); do
            if mysql -h 127.0.0.1 -P 3306 -u root -proot -e "SELECT 1" mysql_ops_test 2>/dev/null; then
              echo "MySQL ready"
              exit 0
            fi
            echo "Waiting for MySQL... $i"
            sleep 2
          done
          exit 1

      - name: Build binary
        run: go build -o mysql-ops ./cmd/main.go

      - name: Run smoke tests
        env:
          MYSQL_DSN: root:root@tcp(127.0.0.1:3306)/mysql_ops_test?charset=utf8mb4&parseTime=True
          MYSQL_OPS_CI: "1"
        run: ./scripts/smoke_test.sh
